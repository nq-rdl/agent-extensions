name: Build pi-server binaries

on:
  push:
    branches: [main]
    paths: ['skills/pi-rpc/scripts/**']
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cross-compile:
    name: Cross-compile pi-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: skills/pi-rpc/scripts/go.mod
          cache-dependency-path: skills/pi-rpc/scripts/go.sum

      - name: Build platform binaries
        working-directory: skills/pi-rpc/scripts
        run: make cross-compile DESTDIR=$GITHUB_WORKSPACE/plugins/dev-tools/bin

      - name: Create PR with updated binaries
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(pi-rpc): rebuild pi-server binaries'
          branch: chore/rebuild-pi-server-binaries
          title: 'chore(pi-rpc): rebuild pi-server binaries'
          body: |
            Automated rebuild of pi-server binaries triggered by changes to `skills/pi-rpc/scripts/`.

            Built platforms: `linux/amd64`, `darwin/arm64`, `darwin/amd64`
          add-paths: plugins/dev-tools/bin/pi-server-*
          delete-branch: true
