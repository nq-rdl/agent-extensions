name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.actor != 'nq-rdl-release-bot[bot]'

    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Verify tag points to a commit on main
        env:
          SHA: ${{ github.sha }}
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$SHA" origin/main; then
            echo "::error::Release tags must point to commits already on main."
            exit 1
          fi

      - name: Check for unreleased changes
        run: |
          if [ -z "$(ls .changes/unreleased/ 2>/dev/null | grep -v .gitkeep)" ]; then
            echo "::error::No unreleased changelog entries found. Nothing to release."
            exit 1
          fi

      - name: Extract version from tag
        id: version
        env:
          TAG: ${{ github.ref_name }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install changie
        uses: miniscruff/changie-action@v3
        with:
          version: latest

      - name: Batch and merge changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          changie batch "$version"
          changie merge

      - name: Bump versions in all manifests
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          # --- JSON files: update "version" fields via jq ---
          json_files=(
            .claude-plugin/marketplace.json
            gemini-extension.json
            mcp/pi-rpc/package.json
            mcp/gemini-cli/package.json
            pidev/package.json
          )
          for f in plugins/*/.claude-plugin/plugin.json; do
            json_files+=("$f")
          done

          for f in "${json_files[@]}"; do
            if [ -f "$f" ]; then
              jq --arg v "$VERSION" '
                if .version then .version = $v else . end
                | if .metadata?.version then .metadata.version = $v else . end
                | if .plugins then .plugins |= map(.version = $v) else . end
              ' "$f" > "${f}.tmp" && mv "${f}.tmp" "$f"
              echo "  ✓ $f"
            fi
          done

          # --- TOML files: update version field ---
          if [ -f pyproject.toml ]; then
            sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
            echo "  ✓ pyproject.toml"
          fi

      - name: Commit version bump and changelog
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes needed"
          else
            git commit -m "chore: release ${TAG} — bump versions and update changelog"
            git push origin HEAD:main
          fi

      - name: Move tag to include release commit
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git tag -f "$TAG"
          git push origin "$TAG" --force

      - name: Prepare release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          cp ".changes/${version}.md" release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          generate_release_notes: false
