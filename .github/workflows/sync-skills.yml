name: Sync skills from agent-skills

on:
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Clone agent-skills and copy skill directories
        env:
          AGENT_SKILLS_TOKEN: ${{ secrets.AGENT_SKILLS_TOKEN }}
        run: |
          if [ -z "$AGENT_SKILLS_TOKEN" ]; then
            echo "::error::AGENT_SKILLS_TOKEN secret is required"
            exit 1
          fi

          # Clone agent-skills (shallow, just the skills/ directory)
          git clone --depth 1 \
            "https://x-access-token:${AGENT_SKILLS_TOKEN}@github.com/nq-rdl/agent-skills.git" \
            /tmp/agent-skills

          SOURCE_SHA=$(git -C /tmp/agent-skills rev-parse HEAD)
          echo "agent-skills HEAD: $SOURCE_SHA"

          # Remove existing vendored skills (preserving any non-skill files)
          # Only remove directories that have a SKILL.md (i.e. actual skills)
          for dir in skills/*/; do
            [ -f "$dir/SKILL.md" ] && rm -rf "$dir"
          done

          # Copy fresh skills from agent-skills/skills/ → skills/
          cp -r /tmp/agent-skills/skills/* skills/

          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_ENV"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet skills/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No skill changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Skill changes detected:"
            git diff --stat skills/
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${source_sha:0:7}"
          BRANCH="chore/sync-skills-${SHORT_SHA}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add skills/
          git commit -m "chore(skills): sync from agent-skills@${SHORT_SHA}"

          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore(skills): sync from agent-skills@${SHORT_SHA}" \
            --body "$(cat <<EOF
          ## Summary

          Automated sync of skill directories from [nq-rdl/agent-skills](https://github.com/nq-rdl/agent-skills).

          Source commit: nq-rdl/agent-skills@${source_sha}

          ## Changes

          $(git diff --stat HEAD~1)
          EOF
          )" \
            --label "dependencies"
