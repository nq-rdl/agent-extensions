name: Build MCP server binaries

on:
  push:
    branches: [main]
    paths:
      - 'mcp/pi-rpc-go/**'
      - 'mcp/gemini-cli-go/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  cross-compile:
    name: Cross-compile MCP servers
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server:
          - name: pi-rpc-mcp
            dir: mcp/pi-rpc-go
          - name: gemini-cli-mcp
            dir: mcp/gemini-cli-go

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.server.dir }}/go.mod
          cache-dependency-path: ${{ matrix.server.dir }}/go.sum

      - name: Download dependencies
        working-directory: ${{ matrix.server.dir }}
        run: go mod download

      - name: Build platform binaries
        working-directory: ${{ matrix.server.dir }}
        env:
          DESTDIR: ${{ github.workspace }}/plugins/dev-tools/bin/mcp
        run: make cross-compile DESTDIR="$DESTDIR"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.server.name }}-binaries
          path: plugins/dev-tools/bin/mcp/${{ matrix.server.name }}-*

  open-pr:
    name: Open PR with updated binaries
    runs-on: ubuntu-latest
    needs: cross-compile
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-binaries'
          path: plugins/dev-tools/bin/mcp/
          merge-multiple: true

      - name: Create PR with updated binaries
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore(mcp): rebuild MCP server binaries'
          branch: chore/rebuild-mcp-binaries
          title: 'chore(mcp): rebuild MCP server binaries'
          body: |
            Automated rebuild of MCP server binaries triggered by changes to `mcp/`.

            Built servers: `pi-rpc-mcp`, `gemini-cli-mcp`
            Built platforms: `linux/amd64`, `linux/arm64`, `darwin/amd64`, `darwin/arm64`
          add-paths: plugins/dev-tools/bin/mcp/*
          delete-branch: true
