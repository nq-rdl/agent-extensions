name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-submodule:
    name: Validate skills submodule wiring
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify skills submodule is declared and pinned
        run: |
          path="$(git config -f .gitmodules --get submodule.skills.path || true)"
          url="$(git config -f .gitmodules --get submodule.skills.url || true)"

          if [ "$path" != "skills" ]; then
            echo "::error::.gitmodules must declare submodule.skills.path=skills"
            exit 1
          fi
          if [ "$url" != "../agent-skills.git" ]; then
            echo "::error::.gitmodules must declare submodule.skills.url=../agent-skills.git"
            exit 1
          fi

          entry="$(git ls-tree HEAD skills || true)"
          if [ -z "$entry" ]; then
            echo "::error::skills/ is not pinned in the git tree"
            exit 1
          fi

          set -- $entry
          if [ "$1" != "160000" ] || [ "$2" != "commit" ]; then
            echo "::error::skills/ must be committed as a git submodule entry"
            exit 1
          fi

          echo "skills/ submodule is pinned to $3"

  validate-bundles:
    name: Validate bundle skill references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check bundle skill references resolve
        env:
          AGENT_SKILLS_TOKEN: ${{ secrets.AGENT_SKILLS_TOKEN }}
        run: |
          shopt -s nullglob
          bundles=(registry/bundles/*.yaml registry/bundles/*.yml)
          if [ ${#bundles[@]} -eq 0 ]; then
            echo "No bundle manifests to validate"
            exit 0
          fi

          if [ -z "$AGENT_SKILLS_TOKEN" ]; then
            echo "::warning::AGENT_SKILLS_TOKEN not set — skipping bundle skill resolution (structural validation only)"
            echo "Bundle manifests found: ${bundles[*]}"
            exit 0
          fi

          git submodule sync --recursive
          git \
            -c url."https://x-access-token:${AGENT_SKILLS_TOKEN}@github.com/".insteadOf="https://github.com/" \
            -c url."https://x-access-token:${AGENT_SKILLS_TOKEN}@github.com/".insteadOf="git@github.com:" \
            submodule update --init --depth 1 skills

          exit_code=0
          for bundle in "${bundles[@]}"; do
            echo "Checking $bundle"
            # Extract skill names from the skills: list
            in_skills=false
            while IFS= read -r line; do
              if echo "$line" | grep -qE '^skills:'; then
                in_skills=true
                continue
              fi
              if $in_skills; then
                if echo "$line" | grep -qE '^\s+-\s+'; then
                  skill=$(echo "$line" | sed 's/^\s*-\s*//' | tr -d '[:space:]')
                  if [ ! -d "skills/skills/$skill" ] && [ ! -d "skills/src/$skill" ] && [ ! -d "skills/$skill" ]; then
                    echo "::error file=$bundle::Skill '$skill' not found in skills/ submodule"
                    exit_code=1
                  else
                    echo "  ✓ $skill"
                  fi
                else
                  in_skills=false
                fi
              fi
            done < "$bundle"
          done
          exit $exit_code

  validate-symlinks:
    name: Validate skill symlinks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check all skill symlinks resolve
        env:
          AGENT_SKILLS_TOKEN: ${{ secrets.AGENT_SKILLS_TOKEN }}
        run: |
          mapfile -t links < <(find plugins/ gemini/ opencode/ pidev/ -type l 2>/dev/null)
          if [ ${#links[@]} -eq 0 ]; then
            echo "No target symlinks to validate"
            exit 0
          fi

          needs_skills=false
          for link in "${links[@]}"; do
            target=$(readlink "$link")
            if [[ "$target" == *skills/* ]] || [[ "$link" == *skills/* ]]; then
              needs_skills=true
              break
            fi
          done

          if ! $needs_skills; then
            echo "No skill symlinks to validate"
            exit 0
          fi

          if [ -z "$AGENT_SKILLS_TOKEN" ]; then
            echo "::warning::AGENT_SKILLS_TOKEN not set — skipping symlink resolution (structural validation only)"
            exit 0
          fi

          git submodule sync --recursive
          git \
            -c url."https://x-access-token:${AGENT_SKILLS_TOKEN}@github.com/".insteadOf="https://github.com/" \
            -c url."https://x-access-token:${AGENT_SKILLS_TOKEN}@github.com/".insteadOf="git@github.com:" \
            submodule update --init --depth 1 skills

          exit_code=0
          for link in "${links[@]}"; do
            target=$(readlink "$link")
            if [[ "$target" == *skills/* ]] || [[ "$link" == *skills/* ]]; then
              if [ ! -e "$link" ]; then
                echo "::error::Broken skill symlink: $link -> $target"
                exit_code=1
              else
                echo "✓ $link -> $target"
              fi
            fi
          done
          if [ $exit_code -eq 0 ]; then
            echo "All skill symlinks are valid (or none exist yet)"
          fi
          exit $exit_code
