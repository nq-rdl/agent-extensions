name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-bundles:
    name: Validate bundle skill references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check bundle skill references resolve
        run: |
          shopt -s nullglob
          bundles=(registry/bundles/*.yaml registry/bundles/*.yml)
          if [ ${#bundles[@]} -eq 0 ]; then
            echo "No bundle manifests to validate"
            exit 0
          fi

          exit_code=0
          for bundle in "${bundles[@]}"; do
            echo "Checking $bundle"
            in_skills=false
            while IFS= read -r line; do
              if echo "$line" | grep -qE '^skills:'; then
                in_skills=true
                continue
              fi
              if $in_skills; then
                if echo "$line" | grep -qE '^\s+-\s+'; then
                  skill=$(echo "$line" | sed 's/^\s*-\s*//' | tr -d '[:space:]')
                  if [ ! -d "skills/$skill" ]; then
                    echo "::error file=$bundle::Skill '$skill' not found in skills/"
                    exit_code=1
                  else
                    echo "  ✓ $skill"
                  fi
                else
                  in_skills=false
                fi
              fi
            done < "$bundle"
          done
          exit $exit_code

  validate-symlinks:
    name: Validate skill symlinks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check all skill symlinks resolve
        run: |
          mapfile -t links < <(find plugins/ opencode/ pidev/ -type l 2>/dev/null)
          if [ ${#links[@]} -eq 0 ]; then
            echo "No symlinks to validate"
            exit 0
          fi

          exit_code=0
          for link in "${links[@]}"; do
            if [ ! -e "$link" ]; then
              echo "::error::Broken symlink: $link -> $(readlink "$link")"
              exit_code=1
            else
              echo "✓ $link -> $(readlink "$link")"
            fi
          done
          if [ $exit_code -eq 0 ]; then
            echo "All symlinks are valid"
          fi
          exit $exit_code

  validate-plugins:
    name: Validate Claude Code plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate plugin manifests and hooks
        run: scripts/validate-plugin-hooks.sh

  validate-mcp-servers:
    name: Validate Go MCP servers build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server:
          - dir: mcp/pi-rpc-go
          - dir: mcp/gemini-cli-go
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.server.dir }}/go.mod

      - name: Download dependencies
        working-directory: ${{ matrix.server.dir }}
        run: go mod download

      - name: Build and vet
        working-directory: ${{ matrix.server.dir }}
        run: |
          go build ./...
          go vet ./...
